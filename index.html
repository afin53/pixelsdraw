<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pixel for world - Voice & Lock Update</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #login-screen {
            background: #34495e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
        }
        #login-screen input {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            width: 200px;
            margin-bottom: 15px;
            outline: none;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        #login-screen button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #app-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(52, 73, 94, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            z-index: 5;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            max-width: 900px;
        }
        .toolbar button {
            padding: 8px 12px;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #7f8c8d;
            color: white;
            transition: 0.2s;
        }
        .toolbar button.active {
            background: #2ecc71;
        }
        .toolbar button.locked-btn.active, .toolbar button.cooldown-btn {
            background: #f1c40f;
            color: #2c3e50;
        }
        .toolbar button.mic-recording {
            background: #e74c3c;
            box-shadow: 0 0 10px #e74c3c;
            animation: pulse 1s infinite;
        }
        .toolbar button.vote-btn {
            background: #c0392b;
        }
        .brush-size-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        #colorPicker {
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
        }
        canvas {
            background-color: #ffffff;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            touch-action: none; 
        }
        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 9999;
            white-space: nowrap;
        }
        #save-timer {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 10;
        }
        #voice-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Введи свій нікнейм</h2>
        <input type="text" id="username" placeholder="Твій нік..." autocomplete="off">
        <button onclick="login()">Почати малювати</button>
    </div>

    <div id="app-screen">
        <div class="toolbar">
            <input type="color" id="colorPicker" value="#000000">
            <button id="brushBtn" class="active" onclick="setTool('brush')">🖌️ Пензлик</button>
            <button id="eraserBtn" onclick="setTool('eraser')">🧽 Ластік</button>
            <button id="lockToggleBtn" class="locked-btn" onclick="toggleLock()">🔓 Замок (Вимк)</button>
            
            <div class="brush-size-container">
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <span id="sizeVal">5px</span>
            </div>
            
            <button id="undoBtn" onclick="undoAction()">↩️ Скасувати</button>
            <button id="micBtn" onclick="toggleVoice()">🎙️ Голосуха (Готовий)</button>
            <button id="voteBtn" class="vote-btn" onclick="castVote()">🧨 (0/0)</button>
            <span id="userInfo" style="font-weight: bold; margin-left: 5px;"></span>
        </div>
        
        <canvas id="canvas"></canvas>
        <div id="save-timer">Супа: 🛡️ Оптимізація + Войс</div>
        <div id="voice-toast">🔊 Хтось говорить...</div>
    </div>

    <div id="tooltip"></div>

    <script>
        const supabaseUrl = 'https://gisxvbtkjbiagslporjq.supabase.co';
        const supabaseKey = 'sb_publishable_o4Z1p2Y6_OzV0cH_BptYew_BNp8MpVY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = '';
        let currentTool = 'brush';
        let isDrawing = false;
        let isLockedMode = false;
        
        let lastX = null;
        let lastY = null;
        let lastPaintTime = 0;
        
        const pixelMap = {}; 
        let rawDataHistory = [];
        let undoStack = []; // Історія для кнопки "Скасувати"
        
        let broadcastQueue = [];
        let dbInsertMap = new Map(); 

        let room;
        let onlineUsers = new Set();
        let votedUsers = new Set();
        let myVote = false;

        // Змінні для мікрофона
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let onMicCooldown = false;
        let micTimeout;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const colorPicker = document.getElementById('colorPicker');
        const brushSizeInput = document.getElementById('brushSize');
        const sizeValDisplay = document.getElementById('sizeVal');

        brushSizeInput.addEventListener('input', (e) => {
            sizeValDisplay.innerText = e.target.value + 'px';
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redrawEverything();
        }

        function login() {
            const input = document.getElementById('username').value.trim();
            if (!input) return alert('Нікнейм не може бути порожнім!');
            currentUser = input;
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('userInfo').innerText = `| ${currentUser}`;
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            loadPixels();
            setupRealtimeAndPresence();
            startNetworkLoops();
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('brushBtn').classList.toggle('active', tool === 'brush');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        }

        function toggleLock() {
            isLockedMode = !isLockedMode;
            const btn = document.getElementById('lockToggleBtn');
            btn.classList.toggle('active', isLockedMode);
            btn.innerText = isLockedMode ? '🔒 Замок (Увімк)' : '🔓 Замок (Вимк)';
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return { x: Math.floor(clientX - rect.left), y: Math.floor(clientY - rect.top) };
        }

        function drawBlock(startX, startY, size, color, author, locked) {
            ctx.fillStyle = color;
            ctx.fillRect(startX, startY, size, size);

            for (let i = startX; i < startX + size; i++) {
                for (let j = startY; j < startY + size; j++) {
                    if (color === '#ffffff') {
                        delete pixelMap[`${i},${j}`];
                    } else {
                        pixelMap[`${i},${j}`] = { author: author, locked: locked };
                    }
                }
            }
        }

        function handlePaint(e) {
            const coords = getCoords(e);
            const size = parseInt(brushSizeInput.value);
            const startX = coords.x - Math.floor(size / 2);
            const startY = coords.y - Math.floor(size / 2);

            if (startX === lastX && startY === lastY) return;
            
            const now = Date.now();
            if (now - lastPaintTime < 12) return; 
            lastPaintTime = now;
            
            lastX = startX;
            lastY = startY;

            let color = colorPicker.value;
            let targetLockState = isLockedMode;

            if (currentTool === 'eraser') {
                color = '#ffffff';
                targetLockState = false;
            }

            // ПОВНИЙ ФІКС ЗАМКА: Перевіряємо кожен піксель, на який наїжджає пензлик чи ластик
            let hitForeignLock = false;
            for (let i = startX; i < startX + size; i++) {
                for (let j = startY; j < startY + size; j++) {
                    const checkPixel = pixelMap[`${i},${j}`];
                    if (checkPixel && checkPixel.locked && checkPixel.author !== currentUser) {
                        hitForeignLock = true;
                        break;
                    }
                }
                if (hitForeignLock) break;
            }
            // Якщо напоролися на чужий замок - навіть не намагаємося малювати
            if (hitForeignLock) return;

            drawBlock(startX, startY, size, color, currentUser, targetLockState);
            
            const actionData = { 
                x: startX, y: startY, size: size, color: color, 
                user_nickname: currentUser, is_locked: targetLockState 
            };
            
            broadcastQueue.push(actionData);
            
            const coordKey = `${startX},${startY}`;
            dbInsertMap.set(coordKey, actionData);
            
            rawDataHistory.push(actionData);
            undoStack.push(actionData); 
        }

        // Логіка відміни
        function undoAction() {
            if (undoStack.length === 0) return;
            const lastAction = undoStack.pop(); 
            
            const undoData = {
                x: lastAction.x, y: lastAction.y, size: lastAction.size,
                color: '#ffffff', user_nickname: currentUser, is_locked: false
            };

            drawBlock(undoData.x, undoData.y, undoData.size, undoData.color, undoData.user_nickname, undoData.is_locked);
            broadcastQueue.push(undoData);
            dbInsertMap.set(`${undoData.x},${undoData.y}`, undoData);
        }

        // ---------- ВОЙС ЧАТ ----------
        async function initVoice() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];
                    
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result;
                        room.send({ type: 'broadcast', event: 'voice_msg', payload: { user: currentUser, audio: base64Audio } });
                    };
                };
            } catch (err) {
                alert("Потрібен дозвіл на мікрофон для голосового чату!");
                console.error(err);
            }
        }

        function toggleVoice() {
            if (onMicCooldown) return;
            
            if (!mediaRecorder) {
                initVoice().then(() => {
                    if(mediaRecorder) startRecording();
                });
                return;
            }

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            isRecording = true;
            audioChunks = [];
            mediaRecorder.start();
            
            const btn = document.getElementById('micBtn');
            btn.innerText = '🔴 Запис... (Макс 30с)';
            btn.classList.add('mic-recording');

            // Автостоп через 30 секунд
            micTimeout = setTimeout(() => {
                if (isRecording) stopRecording();
            }, 30000);
        }

        function stopRecording() {
            isRecording = false;
            clearTimeout(micTimeout);
            mediaRecorder.stop();
            
            onMicCooldown = true;
            let timeLeft = 300; // 5 хвилин
            const btn = document.getElementById('micBtn');
            btn.classList.remove('mic-recording');
            btn.classList.add('cooldown-btn');
            
            const cdInterval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                btn.innerText = `⏳ Кулдаун (${min}:${sec < 10 ? '0' : ''}${sec})`;
                
                if (timeLeft <= 0) {
                    clearInterval(cdInterval);
                    onMicCooldown = false;
                    btn.classList.remove('cooldown-btn');
                    btn.innerText = '🎙️ Голосуха (Готовий)';
                }
            }, 1000);
        }

        function showVoiceToast(user) {
            const toast = document.getElementById('voice-toast');
            toast.innerText = `🔊 Відтворюється голосуха від: ${user}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }
        // ------------------------------

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; lastX = null; lastY = null; handlePaint(e); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) handlePaint(e); });
        window.addEventListener('mouseup', () => { isDrawing = false; });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; lastX = null; lastY = null; handlePaint(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (isDrawing) handlePaint(e); }, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing || (e.touches && e.touches.length > 0)) return;
            const coords = getCoords(e);
            const p = pixelMap[`${coords.x},${coords.y}`];

            if (p) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.innerText = `Малював: ${p.author}` + (p.locked ? ' 🔒' : '');
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

        function redrawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            for (let key in pixelMap) delete pixelMap[key];
            rawDataHistory.forEach(p => {
                drawBlock(p.x, p.y, p.size || 1, p.color, p.user_nickname, p.is_locked);
            });
        }

        async function loadPixels() {
            const { data } = await supabaseClient.from('pixels').select('*').order('created_at', { ascending: true }).limit(100000); 
            if (data) { rawDataHistory = data; redrawEverything(); }
        }

        function startNetworkLoops() {
            setInterval(() => {
                if (broadcastQueue.length > 0) {
                    room.send({ type: 'broadcast', event: 'p2p_action', payload: broadcastQueue });
                    broadcastQueue = [];
                }
            }, 60);

            setInterval(async () => {
                if (dbInsertMap.size > 0) {
                    const batch = Array.from(dbInsertMap.values());
                    dbInsertMap.clear();
                    const chunkSize = 400;
                    for (let i = 0; i < batch.length; i += chunkSize) {
                        try { await supabaseClient.from('pixels').insert(batch.slice(i, i + chunkSize)); } 
                        catch (err) { console.error(err); }
                    }
                }
            }, 2000);
        }

        function setupRealtimeAndPresence() {
            room = supabaseClient.channel('pixel_room', {
                config: { presence: { key: currentUser } }
            });

            room.on('presence', { event: 'sync' }, () => {
                const state = room.presenceState();
                onlineUsers.clear();
                Object.keys(state).forEach(id => { onlineUsers.add(state[id][0].user_nickname); });
                updateVoteUI();
                checkClearCondition();
            });

            room.on('broadcast', { event: 'vote_clear' }, (payload) => {
                votedUsers.add(payload.payload.user);
                updateVoteUI();
                checkClearCondition();
            });

            room.on('broadcast', { event: 'p2p_action' }, (payload) => {
                const actions = payload.payload;
                actions.forEach(p => {
                    rawDataHistory.push(p);
                    drawBlock(p.x, p.y, p.size || 1, p.color, p.user_nickname, p.is_locked);
                });
            });

            // Обробка вхідного голосового повідомлення
            room.on('broadcast', { event: 'voice_msg' }, (payload) => {
                const data = payload.payload;
                if (data.user !== currentUser) {
                    showVoiceToast(data.user);
                    const audio = new Audio(data.audio);
                    audio.play();
                }
            });

            room.on('broadcast', { event: 'p2p_wipe' }, () => {
                votedUsers.clear(); myVote = false;
                document.getElementById('voteBtn').classList.remove('active');
                rawDataHistory = []; redrawEverything(); updateVoteUI();
            });

            room.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') await room.track({ user_nickname: currentUser });
            });
        }

        function castVote() {
            if (!myVote) {
                myVote = true; votedUsers.add(currentUser);
                document.getElementById('voteBtn').classList.add('active');
                room.send({ type: 'broadcast', event: 'vote_clear', payload: { user: currentUser } });
                updateVoteUI(); checkClearCondition();
            }
        }

        function updateVoteUI() {
            const activeVotes = [...votedUsers].filter(u => onlineUsers.has(u));
            const total = onlineUsers.size || 1;
            document.getElementById('voteBtn').innerText = `🧨 (${activeVotes.length}/${total})`;
        }

        async function checkClearCondition() {
            const activeVotes = [...votedUsers].filter(u => onlineUsers.has(u));
            const total = onlineUsers.size || 1;
            
            if (activeVotes.length >= total && total > 0) {
                await supabaseClient.from('pixels').delete().neq('size', -1);
                room.send({ type: 'broadcast', event: 'p2p_wipe', payload: {} });
                votedUsers.clear(); myVote = false;
                document.getElementById('voteBtn').classList.remove('active');
                rawDataHistory = []; redrawEverything(); updateVoteUI();
                alert("Усі проголосували! Полотно очищено 🧨");
            }
        }
    </script>
</body>
</html>
