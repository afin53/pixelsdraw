<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pixel for world</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #login-screen {
            background: #34495e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
        }
        #login-screen input {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            width: 200px;
            margin-bottom: 15px;
            outline: none;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        #login-screen button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #app-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(52, 73, 94, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            z-index: 5;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            max-width: 800px;
        }
        .toolbar button {
            padding: 8px 12px;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #7f8c8d;
            color: white;
            transition: 0.2s;
        }
        .toolbar button.active {
            background: #2ecc71;
        }
        .toolbar button.locked-btn.active {
            background: #f1c40f;
            color: #2c3e50;
        }
        .toolbar button.vote-btn {
            background: #c0392b;
        }
        .toolbar button.vote-btn.active {
            background: #e74c3c;
            box-shadow: 0 0 10px #e74c3c;
        }
        .brush-size-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        #colorPicker {
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
        }
        canvas {
            background-color: #ffffff;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            touch-action: none; 
        }
        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 9999;
            white-space: nowrap;
        }
        #save-timer {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Введи свій нікнейм</h2>
        <input type="text" id="username" placeholder="Твій нік..." autocomplete="off">
        <button onclick="login()">Почати малювати</button>
    </div>

    <div id="app-screen">
        <div class="toolbar">
            <input type="color" id="colorPicker" value="#000000">
            <button id="brushBtn" class="active" onclick="setTool('brush')">🖌️ Пензлик</button>
            <button id="eraserBtn" onclick="setTool('eraser')">🧽 Ластік</button>
            <button id="lockToggleBtn" class="locked-btn" onclick="toggleLock()">🔓 Замок (Вимк)</button>
            
            <div class="brush-size-container">
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <span id="sizeVal">5px</span>
            </div>
            
            <button id="voteBtn" class="vote-btn" onclick="castVote()">🧨 Стерти все (0/0)</button>
            <span id="userInfo" style="font-weight: bold; margin-left: 5px;"></span>
        </div>
        
        <canvas id="canvas"></canvas>
        <div id="save-timer">Режим: 📶 Слабкий інтернет (Оптимізовано)</div>
    </div>

    <div id="tooltip"></div>

    <script>
        const supabaseUrl = 'https://gisxvbtkjbiagslporjq.supabase.co';
        const supabaseKey = 'sb_publishable_o4Z1p2Y6_OzV0cH_BptYew_BNp8MpVY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = '';
        let currentTool = 'brush';
        let isDrawing = false;
        let isLockedMode = false;
        
        // Для інтерполяції ліній (Lerp)
        let lastX = null;
        let lastY = null;
        let lastPaintTime = 0;
        
        const pixelMap = {}; 
        let rawDataHistory = [];
        
        let broadcastQueue = [];
        let dbInsertQueue = [];

        let room;
        let onlineUsers = new Set();
        let votedUsers = new Set();
        let myVote = false;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const colorPicker = document.getElementById('colorPicker');
        const brushSizeInput = document.getElementById('brushSize');
        const sizeValDisplay = document.getElementById('sizeVal');

        brushSizeInput.addEventListener('input', (e) => {
            sizeValDisplay.innerText = e.target.value + 'px';
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redrawEverything();
        }

        function login() {
            const input = document.getElementById('username').value.trim();
            if (!input) return alert('Нікнейм не може бути порожнім!');
            currentUser = input;
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('userInfo').innerText = `| ${currentUser}`;
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            loadPixels();
            setupRealtimeAndPresence();
            startNetworkLoops();
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('brushBtn').classList.toggle('active', tool === 'brush');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        }

        function toggleLock() {
            isLockedMode = !isLockedMode;
            const btn = document.getElementById('lockToggleBtn');
            btn.classList.toggle('active', isLockedMode);
            btn.innerText = isLockedMode ? '🔒 Замок (Увімк)' : '🔓 Замок (Вимк)';
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return { x: Math.floor(clientX - rect.left), y: Math.floor(clientY - rect.top) };
        }

        function drawBlock(startX, startY, size, color, author, locked) {
            ctx.fillStyle = color;
            ctx.fillRect(startX, startY, size, size);

            for (let i = startX; i < startX + size; i++) {
                for (let j = startY; j < startY + size; j++) {
                    if (color === '#ffffff') {
                        delete pixelMap[`${i},${j}`];
                    } else {
                        pixelMap[`${i},${j}`] = { author: author, locked: locked };
                    }
                }
            }
        }

        // Функція малювання та інтерполяції (Lerp) між точками для компенсації лагів
        function paintSequence(x1, y1, x2, y2, size, color, targetLockState) {
            const dist = Math.hypot(x2 - x1, y2 - y1);
            const steps = Math.max(Math.ceil(dist / (size / 3 || 1)), 1);

            for (let step = 0; step <= steps; step++) {
                const t = steps === 0 ? 0 : step / steps;
                const curX = Math.floor(x1 + (x2 - x1) * t);
                const curY = Math.floor(y1 + (y2 - y1) * t);
                const startX = curX - Math.floor(size / 2);
                const startY = curY - Math.floor(size / 2);

                if (currentTool === 'eraser') {
                    const centerPixel = pixelMap[`${curX},${curY}`];
                    if (centerPixel && centerPixel.locked && centerPixel.author !== currentUser) {
                        continue; 
                    }
                }

                drawBlock(startX, startY, size, color, currentUser, targetLockState);

                // Стискаємо імена ключів об'єкта для супер-економії мережевого трафіку
                const compressedAction = { 
                    x: startX, y: startY, s: size, c: color, 
                    u: currentUser, l: targetLockState ? 1 : 0 
                };
                
                broadcastQueue.push(compressedAction);

                // Для збереження в БД повертаємо стандартні назви полів
                dbInsertQueue.push({
                    x: startX, y: startY, size: size, color: color,
                    user_nickname: currentUser, is_locked: targetLockState
                });

                rawDataHistory.push({
                    x: startX, y: startY, size: size, color: color,
                    user_nickname: currentUser, is_locked: targetLockState
                });
            }
        }

        function handlePaint(e) {
            const coords = getCoords(e);
            const size = parseInt(brushSizeInput.value);
            
            const now = Date.now();
            if (now - lastPaintTime < 10) return; 
            lastPaintTime = now;

            let color = colorPicker.value;
            let targetLockState = isLockedMode;

            if (currentTool === 'eraser') {
                color = '#ffffff';
                targetLockState = false;
            }

            if (lastX === null || lastY === null) {
                lastX = coords.x;
                lastY = coords.y;
            }

            // Малюємо суцільну лінію від старої координати до нової
            paintSequence(lastX, lastY, coords.x, coords.y, size, color, targetLockState);
            
            lastX = coords.x;
            lastY = coords.y;
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; lastX = null; lastY = null; handlePaint(e); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) handlePaint(e); });
        window.addEventListener('mouseup', () => { isDrawing = false; lastX = null; lastY = null; });

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; lastX = null; lastY = null; handlePaint(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (isDrawing) handlePaint(e); }, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; lastX = null; lastY = null; });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing || (e.touches && e.touches.length > 0)) return;
            const coords = getCoords(e);
            const p = pixelMap[`${coords.x},${coords.y}`];

            if (p) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.innerText = `Малював: ${p.author}` + (p.locked ? ' 🔒' : '');
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

        function redrawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            for (let key in pixelMap) delete pixelMap[key];
            rawDataHistory.forEach(p => {
                drawBlock(p.x, p.y, p.size || 1, p.color, p.user_nickname, p.is_locked);
            });
        }

        async function loadPixels() {
            const { data } = await supabaseClient.from('pixels')
                .select('*')
                .order('created_at', { ascending: true }) 
                .limit(100000); 

            if (data) {
                rawDataHistory = data;
                redrawEverything();
            }
        }

        function startNetworkLoops() {
            // ОПТИМІЗАЦІЯ ІНТЕРНЕТУ: пакетуємо дані раз на 180мс (замість 70мс). Повільний інтернет скаже дякую!
            setInterval(() => {
                if (broadcastQueue.length > 0) {
                    room.send({ type: 'broadcast', event: 'p2p_action', payload: broadcastQueue });
                    broadcastQueue = [];
                }
            }, 180);

            // Рідкісний тихий запис у базу (кожні 3.5 секунди), щоб розвантажити твій інет-канал
            setInterval(async () => {
                if (dbInsertQueue.length > 0) {
                    const batch = [...dbInsertQueue];
                    dbInsertQueue = [];
                    await supabaseClient.from('pixels').insert(batch);
                }
            }, 3500);
        }

        function setupRealtimeAndPresence() {
            room = supabaseClient.channel('pixel_room', {
                config: { presence: { key: currentUser } }
            });

            room.on('presence', { event: 'sync' }, () => {
                const state = room.presenceState();
                onlineUsers.clear();
                Object.keys(state).forEach(id => {
                    onlineUsers.add(state[id][0].user_nickname);
                });
                updateVoteUI();
                checkClearCondition();
            });

            room.on('broadcast', { event: 'vote_clear' }, (payload) => {
                votedUsers.add(payload.payload.user);
                updateVoteUI();
                checkClearCondition();
            });

            // Читання стиснутих P2P пакетів від інших гравців
            room.on('broadcast', { event: 'p2p_action' }, (payload) => {
                const compressedActions = payload.payload;
                compressedActions.forEach(p => {
                    // Розпаковуємо короткі ключі назад у стандартну структуру
                    const uncompressed = {
                        x: p.x, y: p.y, size: p.s, color: p.c,
                        user_nickname: p.u, is_locked: p.l === 1
                    };
                    rawDataHistory.push(uncompressed);
                    drawBlock(uncompressed.x, uncompressed.y, uncompressed.size, uncompressed.color, uncompressed.user_nickname, uncompressed.is_locked);
                });
            });

            room.on('broadcast', { event: 'p2p_wipe' }, () => {
                votedUsers.clear();
                myVote = false;
                document.getElementById('voteBtn').classList.remove('active');
                rawDataHistory = [];
                redrawEverything();
                updateVoteUI();
            });

            room.subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    await room.track({ user_nickname: currentUser });
                }
            });
        }

        function castVote() {
            if (!myVote) {
                myVote = true;
                votedUsers.add(currentUser);
                document.getElementById('voteBtn').classList.add('active');
                room.send({ type: 'broadcast', event: 'vote_clear', payload: { user: currentUser } });
                updateVoteUI();
                checkClearCondition();
            }
        }

        function updateVoteUI() {
            const activeVotes = [...votedUsers].filter(u => onlineUsers.has(u));
            const total = onlineUsers.size || 1;
            document.getElementById('voteBtn').innerText = `🧨 Стерти все (${activeVotes.length}/${total})`;
        }

        async function checkClearCondition() {
            const activeVotes = [...votedUsers].filter(u => onlineUsers.has(u));
            const total = onlineUsers.size || 1;
            
            if (activeVotes.length >= total && total > 0) {
                await supabaseClient.from('pixels').delete().neq('size', -1);
                room.send({ type: 'broadcast', event: 'p2p_wipe', payload: {} });

                votedUsers.clear();
                myVote = false;
                document.getElementById('voteBtn').classList.remove('active');
                
                rawDataHistory = [];
                redrawEverything();
                updateVoteUI();
                alert("Усі проголосували! Полотно очищено 🧨");
            }
        }
    </script>
</body>
</html>
