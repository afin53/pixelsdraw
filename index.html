<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>малювання міні піксель артів</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #login-screen {
            background: #34495e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
        }
        #login-screen input {
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            width: 200px;
            margin-bottom: 15px;
            outline: none;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        #login-screen button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #app-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(52, 73, 94, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            z-index: 5;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 600px;
        }
        .toolbar button {
            padding: 8px 12px;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #7f8c8d;
            color: white;
        }
        .toolbar button.active {
            background: #2ecc71;
        }
        .brush-size-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        #colorPicker {
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
        }
        canvas {
            background-color: #ffffff;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            /* ВАЖЛИВО ДЛЯ ТЕЛЕФОНІВ: вимикає скрол і зум при малюванні */
            touch-action: none; 
        }
        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 9999;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Введи свій нікнейм</h2>
        <input type="text" id="username" placeholder="Твій нік..." autocomplete="off">
        <button onclick="login()">Почати малювати</button>
    </div>

    <div id="app-screen">
        <div class="toolbar">
            <input type="color" id="colorPicker" value="#000000">
            <button id="brushBtn" class="active" onclick="setTool('brush')">🖌️ Пензлик</button>
            <button id="eraserBtn" onclick="setTool('eraser')">Ластік</button>
            
            <div class="brush-size-container">
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <span id="sizeVal">5px</span>
            </div>
            
            <span id="userInfo" style="font-weight: bold; margin-left: 5px;"></span>
        </div>
        
        <canvas id="canvas"></canvas>
    </div>

    <div id="tooltip"></div>

    <script>
        const supabaseUrl = 'https://gisxvbtkjbiagslporjq.supabase.co';
        const supabaseKey = 'sb_publishable_o4Z1p2Y6_OzV0cH_BptYew_BNp8MpVY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = '';
        let currentTool = 'brush';
        let isDrawing = false;
        const pixelMap = {}; 
        let rawDataHistory = [];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const colorPicker = document.getElementById('colorPicker');
        const brushSizeInput = document.getElementById('brushSize');
        const sizeValDisplay = document.getElementById('sizeVal');

        brushSizeInput.addEventListener('input', (e) => {
            sizeValDisplay.innerText = e.target.value + 'px';
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redrawEverything();
        }

        function login() {
            const input = document.getElementById('username').value.trim();
            if (!input) return alert('Нікнейм не може бути порожнім!');
            currentUser = input;
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('userInfo').innerText = `| ${currentUser}`;
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            loadPixels();
            subscribeToRealtime();
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('brushBtn').classList.toggle('active', tool === 'brush');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        }

        // Отримання координат для мишки ТА тачскріну
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;

            // Якщо це дотик на телефоні
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            return {
                x: Math.floor(clientX - rect.left),
                y: Math.floor(clientY - rect.top)
            };
        }

        function drawPixel(x, y, color, author) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
            pixelMap[`${x},${y}`] = author;
        }

        function clearPixelLocally(x, y) {
            ctx.clearRect(x, y, 1, 1);
            delete pixelMap[`${x},${y}`];
        }

        async function handlePaint(e) {
            const coords = getCoords(e);
            const size = parseInt(brushSizeInput.value);
            
            const startX = coords.x - Math.floor(size / 2);
            const startY = coords.y - Math.floor(size / 2);
            const endX = startX + size;
            const endY = startY + size;

            if (currentTool === 'eraser') {
                // Очищаємо полотно локально
                ctx.clearRect(startX, startY, size, size);
                for (let i = startX; i < endX; i++) {
                    for (let j = startY; j < endY; j++) {
                        delete pixelMap[`${i},${j}`];
                    }
                }
                
                // Видаляємо блок пікселів з бази даних Supabase
                await supabaseClient.from('pixels')
                    .delete()
                    .gte('x', startX)
                    .lt('x', endX)
                    .gte('y', startY)
                    .lt('y', endY);

            } else {
                // Малювання пензликом
                const color = colorPicker.value;
                const rowsToInsert = [];

                for (let i = startX; i < endX; i++) {
                    for (let j = startY; j < endY; j++) {
                        drawPixel(i, j, color, currentUser);
                        rowsToInsert.push({ x: i, y: j, color: color, user_nickname: currentUser });
                    }
                }

                if (rowsToInsert.length > 0) {
                    const optimizedRows = rowsToInsert.slice(0, 50); 
                    await supabaseClient.from('pixels').insert(optimizedRows);
                }
            }
        }

        // Обробники для МИШКИ
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; handlePaint(e); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) handlePaint(e); });
        window.addEventListener('mouseup', () => { isDrawing = false; });

        // Обробники для ТЕЛЕФОНІВ (Сенсор)
        canvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); // Зупиняє скрол сторінки
            isDrawing = true; 
            handlePaint(e); 
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            if (isDrawing) handlePaint(e); 
        }, { passive: false });
        
        window.addEventListener('touchend', () => { isDrawing = false; });

        // Ховер (Тільки для ПК, на телефонах тултип не потрібен)
        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing || (e.touches && e.touches.length > 0)) return;
            const coords = getCoords(e);
            const key = `${coords.x},${coords.y}`;
            const author = pixelMap[key];

            if (author) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.innerText = `Малював: ${author}`;
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

        function redrawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            rawDataHistory.forEach(p => {
                drawPixel(p.x, p.y, p.color, p.user_nickname);
            });
        }

        async function loadPixels() {
            const { data, error } = await supabaseClient.from('pixels').select('*');
            if (data) {
                rawDataHistory = data;
                redrawEverything();
            }
        }

        function subscribeToRealtime() {
            // Тепер слухаємо ВСІ події: і INSERT, і DELETE
            supabaseClient.channel('public:pixels')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'pixels' }, payload => {
                    
                    if (payload.eventType === 'INSERT') {
                        const p = payload.new;
                        if (p.user_nickname !== currentUser) {
                            rawDataHistory.push(p);
                            drawPixel(p.x, p.y, p.color, p.user_nickname);
                        }
                    } 
                    
                    if (payload.eventType === 'DELETE') {
                        const oldRow = payload.old;
                        // Видаляємо чужий стираний піксель (якщо є координати)
                        if (oldRow && oldRow.x !== undefined && oldRow.y !== undefined) {
                            clearPixelLocally(oldRow.x, oldRow.y);
                        }
                    }
                })
                .subscribe();
        }
    </script>
</body>
</html>
